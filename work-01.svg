<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Threshold Study</title>
  <desc id="desc">Abstract layered artwork with warm vermilion, ink, and pale blue forms.</desc>
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="3" stitchTiles="stitch"/>
